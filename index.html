<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Runner Scene</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="overlay hide">
      <div class="game-over">
        <div class="game-over-text">Game Over</div>
        <div>Click the restart button to restart the game</div>
        <button class="restart">Restart</button>
      </div>
    </div>

    <div class="score-container">Score: <span class="score">0</span></div>
    <div class="level-container">Level: <span class="level">0</span></div>

    <div class="instruction">
      Use your arrow &lt; &gt; button to control the box
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
